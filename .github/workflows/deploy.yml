name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing Cloudflare API token. Add repository secret named CLOUDFLARE_API_TOKEN or CF_API_TOKEN."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing Cloudflare account id. Add repository secret named CLOUDFLARE_ACCOUNT_ID or CF_ACCOUNT_ID."
            exit 1
          fi
          echo "Cloudflare secrets are present."
          echo "Cloudflare account id length: ${#CLOUDFLARE_ACCOUNT_ID}"

      - name: Show workspace files
        run: |
          pwd
          ls -la
          ls -la .github/workflows || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build static app
        run: npm run build

      - name: Show build output
        run: ls -la dist

      - name: Show Wrangler version
        run: npx wrangler --version

      - name: Deploy Worker
        run: npx wrangler deploy worker/entry.ts
